version: "3.9"

services:
  trader:
    build: .
    container_name: ema-cloud-trader
    restart: unless-stopped          # Auto-restarts on crash or server reboot

    environment:
      - TASTYTRADE_USERNAME=${TASTYTRADE_USERNAME}
      - TASTYTRADE_PASSWORD=${TASTYTRADE_PASSWORD}

    volumes:
      # Persist state.json and settings.json across container restarts
      - ./config:/app/config
      # Persist log file
      - ./logs:/app/logs

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    # Health check — restarts container if process hangs
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('/app/trader.log') else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
